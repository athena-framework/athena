INHERIT: ../../../mkdocs-common.yml

site_name: NAMESPACE_NAME
site_url: https://athenaframework.org/NAMESPACE_NAME/
repo_url: https://github.com/athena-framework/BUNDLE_NAME-bundle

nav:
  - Introduction: README.md
  - Back to Manual: project://.
  - API:
    - Top Level: top_level.md
    - '*'

plugins:
  - search
  - section-index
  - literate-nav
  - gen-files:
      scripts:
        - ../../../gen_doc_stubs.py
  - mkdocstrings:
      default_handler: crystal
      custom_templates: ../../../docs/templates
      handlers:
        crystal:
          crystal_docs_flags:
            - ../../../docs/index.cr
            - ./lib/athena-BUNDLE_NAME_bundle/src/athena-BUNDLE_NAME_bundle.cr
          source_locations:
            lib/athena-BUNDLE_NAME_bundle: https://github.com/athena-framework/BUNDLE_NAME-bundle/blob/v{shard_version}/{file}#L{line}
